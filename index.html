<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio - Joris Texier</title>
  <style>
    :root {
      --bg: #0b1220;
      --bg-soft: #121a2b;
      --card: #182235;
      --text: #e6edf7;
      --muted: #a7b4c8;
      --line: #2a3750;
      --accent: #4da3ff;
      --accent-2: #7dd3fc;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f3ee;
      color: #111827;
      line-height: 1.7;
      font-size: 19px;
    }

    a {
      color: var(--accent-2);
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {
      width: min(1100px, 92%);
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
      background: rgba(244, 243, 238, 0.94);
      border-bottom: 1px solid rgba(30, 58, 138, 0.08);
    }

    .nav {
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .logo {
      font-size: 1.45rem;
      font-weight: 700;
      color: #c9c9c9;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .menu {
      display: flex;
      gap: 12px;
      list-style: none;
      flex-wrap: wrap;
      align-items: center;
    }

    .menu a {
      color: #6b7280;
      font-size: 1.08rem;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 14px 18px;
      display: inline-block;
      transition: 0.2s ease;
    }

    .menu a:hover {
      color: #355d8c;
    }

    .menu a.active-link {
      background: #355d8c;
      color: white;
    }

    .hero {
      padding: 90px 0 70px;
    }

    .hero-home {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 40px;
      align-items: center;
      min-height: 70vh;
    }


    .badge {
      display: inline-block;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(77, 163, 255, 0.08);
      color: var(--accent-2);
      margin-bottom: 18px;
      font-size: 0.92rem;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.15;
      margin-bottom: 16px;
    }

    .hero p {
      color: var(--muted);
      max-width: 700px;
      margin-bottom: 24px;
      font-size: 1.02rem;
    }

    .actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 24px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--card);
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
      transition: 0.2s ease;
      box-shadow: var(--shadow);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), #2563eb);
      border: none;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .hero-text h1 {
      font-size: clamp(2.4rem, 5vw, 4rem);
      color: #1e3a8a;
      margin-bottom: 26px;
    }

    .hero-text p {
      color: #22304a;
      font-size: 1.12rem;
      max-width: 620px;
      margin-bottom: 22px;
      line-height: 1.7;
    }

    .hero-visual {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    
    section {
      padding: 72px 0;
    }

    .section-title {
      font-size: 2.8rem;
      margin-bottom: 12px;
      color: #111827;
    }

    .center {
      text-align: center;
    }

    .section-text {
      color: #374151;
      max-width: 900px;
      margin-bottom: 28px;
      font-size: 1.2rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      background: white;
      border: 1px solid #dbe3ef;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }

    .card h3 {
      margin-bottom: 12px;
      font-size: 1.6rem;
    }

    .card p, .card li {
      color: #374151;
      font-size: 1.15rem;
    }

    .formation-grid {
      align-items: start;
      margin-top: 28px;
    }

    .formation-card {
      height: 100%;
    }

    .formation-card h3 {
      text-align: center;
      font-size: 2.4rem;
      color: #1e3a8a;
      margin-bottom: 24px;
    }

    .formation-card p {
      line-height: 1.9;
      margin-bottom: 16px;
    }

    .formation-card ul {
      padding-left: 26px;
      line-height: 1.9;
    }

    .card ul {
      padding-left: 18px;
    }

    .timeline {
      display: grid;
      gap: 18px;
    }

    .timeline-item {
      border-left: 4px solid var(--accent);
      padding: 18px 18px 18px 20px;
      background: var(--card);
      border-radius: 0 16px 16px 0;
      box-shadow: var(--shadow);
    }

    .timeline-item span {
      display: inline-block;
      color: var(--accent-2);
      margin-bottom: 8px;
      font-weight: 700;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .page-section {
      display: none;
    }

    .active-section {
      display: block;
    }

    footer {
      padding: 28px 0 40px;
      border-top: 1px solid rgba(30,58,138,0.08);
      color: #4b5563;
      text-align: center;
    }

    .skills-home {
      padding-top: 20px;
    }

    .skills-columns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-top: 40px;
      margin-bottom: 36px;
    }

    .skill-box {
      padding: 18px 10px 10px;
    }

    .skill-box h3 {
      font-size: 1.95rem;
      color: #0f172a;
      margin-bottom: 18px;
      text-align: center;
    }

    .skill-box ul {
      margin-top: 16px;
      padding-left: 28px;
      color: #1f2937;
      border-top: 1px solid #d7dde8;
      padding-top: 22px;
      line-height: 2;
      font-size: 1.22rem;
    }

    .progress-zone {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 0 10px;
    }

    .progress-title {
      font-size: 2rem;
      margin-bottom: 24px;
      color: #2563eb;
    }

    
    .progress-item span {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      color: #111827;
    }

    
    
    @media (max-width: 900px) {
      .banner {
        height: 130px;
      }

      body {
        font-size: 17px;
      }

      .container {
        width: min(94%, 100%);
      }

      header {
        position: static;
      }

      .nav {
        min-height: auto;
        align-items: stretch;
        padding: 16px 0;
        flex-direction: column;
      }

      .logo {
        text-align: center;
        font-size: 1.3rem;
      }

      .menu {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        width: 100%;
      }

      .menu li {
        width: 100%;
      }

      .menu a {
        width: 100%;
        text-align: center;
        padding: 12px 10px;
        font-size: 0.95rem;
        letter-spacing: 1.5px;
        border-radius: 10px;
      }

      section {
        padding: 42px 0;
      }

      .cards,
      .grid-2,
      .skills-columns {
        grid-template-columns: 1fr;
      }

      .section-title {
        font-size: 2.1rem;
        text-align: center;
      }

      .skill-box {
        padding: 14px 4px 8px;
      }

      .skill-box h3 {
        font-size: 1.55rem;
      }

      .skill-box ul {
        font-size: 1.05rem;
        line-height: 1.8;
        padding-left: 22px;
      }

      .card {
        padding: 18px;
      }

      .card h3 {
        font-size: 1.35rem;
      }

      .card p,
      .card li,
      .section-text {
        font-size: 1rem;
      }

      .btn {
        width: 100%;
        max-width: 320px;
      }

      footer {
        font-size: 0.95rem;
      }

      #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
      opacity: 0.45;
    }

    .banner {
      width: 100%;
      height: 220px;
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url("https://drive.google.com/file/d/1ImeZWLhFKcetXFF9yU4dMpvUo_Bjsn8E/view?usp=sharing") center/cover no-repeat;
      border-bottom: 1px solid rgba(30, 58, 138, 0.12);
    }-1;
      opacity: 0.45;
    }
  </style>
</body>
</html>
